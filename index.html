<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      eruda.init();
    </script> -->
    
    <script>
      // ── Earliest-possible theme application ─────────────────────────────
      // Runs synchronously right after telegram-web-app.js (sync <script>
      // above), so window.Telegram.WebApp is already initialised.
      // Sets header/bg/bottom-bar colors BEFORE React mounts to avoid the
      // white-header flash when reloading in dark mode.
      (function initThemeImmediately() {
        try {
          var tg         = window.Telegram && window.Telegram.WebApp;
          var saved      = localStorage.getItem("app-theme");
          var tgScheme   = tg && tg.colorScheme; // 'dark' | 'light' from Telegram
          var osDark     = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;

          // Priority: user-saved → Telegram colorScheme → OS preference
          var theme  = saved || (tgScheme || (osDark ? "dark" : "light"));
          var isDark = theme === "dark";

          // 1. CSS class on <html> so page body has correct bg instantly
          document.documentElement.classList.remove("light-theme", "dark-theme");
          document.documentElement.classList.add(theme + "-theme");

          // 2. Telegram header / bg / bottom bar — tg is already available
          if (tg) {
            if (isDark) {
              tg.setBackgroundColor && tg.setBackgroundColor("#000000");
              tg.setHeaderColor    && tg.setHeaderColor("#1C1C1E");
              tg.setBottomBarColor && tg.setBottomBarColor("#1C1C1E");
            } else {
              tg.setBackgroundColor && tg.setBackgroundColor("#F2F2F7");
              tg.setHeaderColor    && tg.setHeaderColor("#FFFFFF");
              tg.setBottomBarColor && tg.setBottomBarColor("#FFFFFF");
            }
          }
        } catch (e) {
          console.error("Early theme init failed:", e);
        }
      })();
    </script>
    <style>
      /* Применяем базовые цвета ДО загрузки CSS */
      html.light-theme {
        background-color: #f2f2f7;
        color: #1d1d1f;
      }

      html.dark-theme {
        background-color: #000000;
        color: #ffffff;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: inherit;
        color: inherit;
        transition: none !important; /* Отключаем transition при первой загрузке */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
